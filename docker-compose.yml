services:
  db:
    image: postgres:15-alpine
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-taskflow}"]
      interval: 3s
      timeout: 3s
      retries: 15

  api:
    build: .
    container_name: taskflow_api
    restart: on-failure
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
